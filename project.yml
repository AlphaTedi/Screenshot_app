name: NotchSnap
options:
  bundleIdPrefix: com.notchsnap
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: NotchSnap
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_ENTITLEMENTS: NotchSnap/Resources/NotchSnap.entitlements
    INFOPLIST_FILE: NotchSnap/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  NotchSnap:
    type: application
    platform: macOS
    sources:
      - path: NotchSnap
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchsnap.app
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
    info:
      path: NotchSnap/Resources/Info.plist
    entitlements:
      path: NotchSnap/Resources/NotchSnap.entitlements
