name: Build & Release NotchSnap

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          ls /Applications | grep -i xcode
          sudo xcode-select -s /Applications/Xcode_16.app 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode_16* | head -1)" 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, unsigned)
        run: |
          set -e
          xcodebuild \
            -project NotchSnap.xcodeproj \
            -scheme NotchSnap \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            SWIFT_VERSION=5.0 \
            clean build

      - name: Package .app into zip
        run: |
          set -e
          APP_PATH="build/Build/Products/Release/NotchSnap.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App non trovata in $APP_PATH"
            find build -name "*.app" -print
            exit 1
          fi
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release/NotchSnap.zip"

      - name: Upload artifact (per workflow_dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: NotchSnap-app
          path: release/NotchSnap.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/NotchSnap.zip
          generate_release_notes: true
